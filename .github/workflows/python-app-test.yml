# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application test

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/docker
        key: ${{ runner.os }}-docker-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-docker-

    - name: Cache npm dependencies
      uses: actions/cache@v3
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}

    - uses: actions/checkout@v4

    - name: create env
      run: cp .env.test .env
        
    - name: Start Docker
      run: |
        set -a
        source .env
        set +a
        bash docker_exec.sh -d

    - name: Check if backend is up
      run: |
        for i in {1..30}; do
          if curl http://localhost:8000/health; then
            echo "Backend is up!"
            exit 0
          fi
          sleep 10
        done
        echo "Backend failed to start within 5 minutes."
        exit 1

    - name: Check if frontend is up
      run: |
        for i in {1..15}; do
          if curl http://localhost:8080; then
            echo "Frontend is up!"
            break
          fi
          sleep 5
        done
    
    - name: Create results directory
      run: |
        mkdir -p results/backend
        mkdir -p results/frontend
    
    - name: Test
      run: |
        # バックグラウンドでbackendテスト実行
        echo "Starting backend tests..."
        (docker compose exec -T backend python -m pytest -vv --junitxml=results/test-results.xml && echo "Backend tests completed") &
        
        # バックグラウンドでfrontendテスト実行
        echo "Starting frontend tests..."
        (docker compose exec -T frontend npx vitest run --reporter=junit --outputFile=results/test-results.xml && echo "Frontend tests completed") &
        
        # 完了を待つ
        wait
          
        # 結果をコピー
        docker compose cp backend:/backend/results/test-results.xml results/backend/ || echo "Failed to copy backend results"
        docker compose cp frontend:/frontend/results/test-results.xml results/frontend/ || echo "Failed to copy frontend results"

    - name: Upload vitest test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: frontend-test-results
        path: results/frontend/test-results.xml
        
    - name: Docker logs
      if: failure()
      run: |
        docker compose logs
        echo "------"
        cat .env
        echo "------"

    - name: Stop Docker Compose
      if: always()
      run: docker compose down -v

